version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: erp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: erp-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://db:27017/enterprise_erp
      - JWT_SECRET=production_secret_key_12345
      - NODE_ENV=production
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: erp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
    driver: local
